<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;background:var(--background);font-family:var(--font-sans)}
.tabs{display:flex;gap:2px;padding:3px;background:var(--muted);border-radius:var(--radius-lg);width:fit-content;height:36px}
.tab{display:inline-flex;align-items:center;gap:6px;padding:0 12px;border-radius:var(--radius-md);font-size:14px;font-weight:500;color:var(--muted-foreground);cursor:pointer;height:100%}
.tab.active{background:var(--background);color:var(--foreground);box-shadow:var(--shadow-sm)}
.b{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 5px;border-radius:9999px;background:var(--primary);color:var(--primary-foreground);font-size:11px;font-weight:500}
</style></head><body>
<div class="tabs">
  <div class="tab active">Incoming<span class="b">3</span></div>
  <div class="tab">Outgoing</div>
</div>
</body></html>
