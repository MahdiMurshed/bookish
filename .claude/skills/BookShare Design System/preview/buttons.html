<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;background:var(--background)}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;height:36px;padding:0 16px;border-radius:var(--radius-md);font-size:14px;font-weight:500;border:0;cursor:pointer;font-family:var(--font-sans);transition:background 120ms}
.primary{background:var(--primary);color:var(--primary-foreground)}
.primary:hover{background:color-mix(in oklch,var(--primary) 90%,transparent)}
.secondary{background:var(--secondary);color:var(--secondary-foreground)}
.outline{background:var(--background);color:var(--foreground);border:1px solid var(--border);box-shadow:var(--shadow-xs)}
.ghost{background:transparent;color:var(--foreground)}
.ghost:hover{background:var(--accent)}
.destructive{background:var(--destructive);color:#fff}
.small{height:32px;padding:0 12px;font-size:13px}
.xs{height:24px;padding:0 8px;font-size:12px}
</style></head><body>
<div class="row">
  <button class="btn primary">Add Book</button>
  <button class="btn secondary">Cancel</button>
  <button class="btn outline">Filter</button>
  <button class="btn ghost">Sign Out</button>
  <button class="btn destructive">Delete</button>
</div>
<div class="row" style="margin-top:12px">
  <button class="btn primary small">Send Request</button>
  <button class="btn outline small">Dismiss</button>
  <button class="btn primary xs">+ 12</button>
</div>
</body></html>
