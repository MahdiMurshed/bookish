<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:16px;}
.row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
.sw{border:1px solid var(--border);border-radius:var(--radius-md);overflow:hidden;font-family:var(--font-mono);font-size:11px}
.chip{height:62px}
.meta{padding:6px 8px;display:flex;flex-direction:column;gap:2px;background:var(--card)}
.name{font-weight:600;color:var(--foreground);font-family:var(--font-sans);font-size:12px}
.val{color:var(--muted-foreground)}
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:var(--background);border-bottom:1px solid var(--border)"></div><div class="meta"><span class="name">background</span><span class="val">oklch(1 0 0)</span></div></div>
  <div class="sw"><div class="chip" style="background:var(--foreground)"></div><div class="meta"><span class="name">foreground</span><span class="val">oklch(.145 0 0)</span></div></div>
  <div class="sw"><div class="chip" style="background:var(--primary)"></div><div class="meta"><span class="name">primary</span><span class="val">oklch(.205 0 0)</span></div></div>
  <div class="sw"><div class="chip" style="background:var(--secondary)"></div><div class="meta"><span class="name">secondary</span><span class="val">oklch(.97 0 0)</span></div></div>
  <div class="sw"><div class="chip" style="background:var(--muted-foreground)"></div><div class="meta"><span class="name">muted-fg</span><span class="val">oklch(.556 0 0)</span></div></div>
</div>
</body></html>
